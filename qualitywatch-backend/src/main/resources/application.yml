spring:
  application:
    name: qualitywatch-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/qualitywatch
    username: qualitywatch
    password: qualitywatch
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 4
          multiplier: 2.0

qualitywatch:
  api-key: ${QUALITYWATCH_API_KEY:}
  schedule:
    coverage-trends-ms: 300000
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  rabbitmq:
    exchange: qualitywatch.telemetry
    queue:
      telemetry: qualitywatch.telemetry.queue
      aggregation: qualitywatch.aggregation.queue
    routing-key:
      telemetry: telemetry.upload
      aggregation: aggregation.process

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
